<!DOCTYPE html>
<!--
Step 2/5: Making a site !
Objectives:
1. Create a website header and place your <h1> element in it.
2. Decide which elements you want to place in your biography block, group them with the <section> tag, and add the about id to this tag.
3. Group the elements in the "Portfolio" section the same way. In this case, use the tag <section> and the id portfolio.
4. Using the tag <section>, сreate another section with the id contacts and place your contact information in it.
5. Create a footer; you can put any information in the footer.
6. Add a navigation bar with anchor links to blocks with the id's about, portfolio, and contacts. Make the navigation bar part of the site's header.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio</title>
</head>
<header>

    <nav>
        <ul>
            <li><a href="#about" title="About me">About me</a></li>
            <li><a href="#portfolio" title="portfolio">Portfolio</a></li>
            <li><a href="#contacts" title="Contacts">Contacts</a></li>
        </ul>
    </nav>

    <h1>Bryan DIFFO, Full Stack Developer</h1>

    <section id="about">
        <h2>About me</h2>
    </section>

    <img src="../images/person.jpg" alt="This person doesn't exist at this point of the project">
</header>
    <body>
        <div>
            <p>Hey, this will be a website around me... Let's do it</p>
            <p><b>Skills:</b> Java, HTML, CSS, Javascript</p>
        </div>

        <section id="portfolio">
            <h2>Portfolio</h2>
            <img src="../images/project1.png" alt="This project is the first one i did in HTML & CSS" style="width: 50%">
            <p>Flashcards</p>
        </section>
    </body>

    <footer>
        <section id="contacts">
            <p>You can contact me at:
                <a href="tel:+1234567890">+1234567890</a>
                or shoot me an email here :
                <a href="mailto:example@mail.com">example@mail.com</a>
            </p>
            <img src="../images/facebook.svg" alt="This project is the first one i did in HTML & CSS" style="border-radius: 30%; width: 50px">
            <img src="../images/github.svg" alt="This project is the first one i did in HTML & CSS" style="border-radius: 30%; width: 50px">
            <img src="../images/instagram.svg" alt="This project is the first one i did in HTML & CSS" style="border-radius: 30%; width: 50px">
            <img src="../images/twitter.svg" alt="This project is the first one i did in HTML & CSS" style="border-radius: 30%; width: 50px">
        </section>
    </footer>
</html>
